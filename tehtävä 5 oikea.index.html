<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workshop 5: Responsive Design</title>

  <style>
    /* TASK 1 */
    .responsive-container {
      display: flex;
      flex-wrap: wrap;
    }

    .column {
      flex: 1;
      padding: 10px;
      background-color: #f2f2f2;
      margin: 5px;
    }

    @media (max-width: 600px) {
      .column {
        flex: 100%;
      }
    }

    /* TASK 2 IMAGE - FIXED (LOCAL SAFE STYLE) */
    .responsive-image {
      width: 100%;
      max-width: 800px;
      height: 300px;
      object-fit: cover;
      display: block;
      margin: 10px 0;
      background: #ddd;
    }

    /* TASK 3 - WORKING CLEAR VERSION */
    .media-query-box {
      padding: 20px;
      text-align: center;
      font-weight: bold;
      background-color: gray;
      color: white;
    }

    @media (max-width: 600px) {
      .media-query-box {
        background-color: red !important;
      }
      .media-query-box::after {
        content: " (MOBILE < 600px)";
      }
    }

    @media (min-width: 601px) {
      .media-query-box {
        background-color: blue !important;
      }
      .media-query-box::after {
        content: " (DESKTOP > 600px)";
      }
    }

    /* TASK 4 NAV */
    .responsive-nav {
      background-color: #333;
      padding: 10px;
    }

    .responsive-nav .nav-list {
      display: flex;
      list-style: none;
      padding: 0;
      margin: 0;
      gap: 15px;
    }

    .responsive-nav .nav-list li a {
      color: white;
      text-decoration: none;
    }

    .menu-toggle {
      display: none;
      background: #444;
      color: white;
      border: none;
      padding: 8px;
      cursor: pointer;
    }

    /* MOBILE NAV */
    @media (max-width: 600px) {
      .responsive-nav .nav-list {
        display: none;
        flex-direction: column;
      }

      .responsive-nav .nav-list.active {
        display: flex;
      }

      .menu-toggle {
        display: block;
      }
    }
  </style>
</head>

<body>

  <h2>Task 1: Responsive Layout</h2>
  <div class="responsive-container">
    <div class="column">Column 1</div>
    <div class="column">Column 2</div>
  </div>

  <h2>Task 2: Responsive Image</h2>

  <!-- VARMA OFFLINE KUVA -->
  <img class="responsive-image" 
       src="https://placehold.co/800x300" 
       alt="Responsive Image">

  <h2>Task 3: Media Queries</h2>
  <div class="media-query-box">
    Resize the window to see the effect
  </div>

  <h2>Task 4: Responsive Navigation</h2>
  <nav class="responsive-nav">
    <button class="menu-toggle">☰ Menu</button>
    <ul class="nav-list">
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <h2>Task 5</h2>
  <p>Open developer tools (F12) and test responsive view.</p>

  <script>
    const toggleBtn = document.querySelector(".menu-toggle");
    const navList = document.querySelector(".nav-list");

    toggleBtn.addEventListener("click", () => {
      navList.classList.toggle("active");
    });
  </script>

</body>
</html>
